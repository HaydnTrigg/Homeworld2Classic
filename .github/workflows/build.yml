name: Build

on:
  pull_request:
    paths-ignore:
      - "*.md"
    types: [opened, synchronize, reopened]
  push:
    paths-ignore:
      - "*.md"
  workflow_dispatch:

jobs:
  matching:
    name: Matching
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        version: [DevRelease, HW2C_Exe]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      # Run configure.py
      - name: Bootstrap
        shell: cmd
        run: bootstrap.bat --config-id ${{ matrix.version }}

      # Run Ninja
      - name: Ninja Build
        run: ninja -k 0

      - name: Objdiff Report
        run: build/tools/objdiff-cli-windows-x86_64.exe report generate -f json-pretty -o build/${{ matrix.version }}/report.json

      # Upload progress report
      - name: Upload Report
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.version }}_report
          path: build/${{ matrix.version }}/report.json

  publish-reports:
    name: Publish Reports
    runs-on: windows-latest
    needs: [matching]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-testing') && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: workflow-reports
          token: ${{ github.token }}
          path: Homeworld2Classic-Reports

      - name: Download DevRelease Report
        uses: actions/download-artifact@v8
        with:
          name: DevRelease_report
          path: DevRelease_report

      - name: Download HW2C_Exe Report
        uses: actions/download-artifact@v8
        with:
          name: HW2C_Exe_report
          path: HW2C_Exe_report

      - name: Publish Report
        shell: powershell
        env:
          COMMIT_TITLE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          $sha = $env:COMMIT_SHA

          # $reportDir = "Homeworld2Classic-Reports\$sha"
          $reportDir = "Homeworld2Classic-Reports"
          New-Item -ItemType Directory -Path $reportDir -Force

          $imagesDir = "Homeworld2Classic-Reports\images"
          New-Item -ItemType Directory -Path $imagesDir -Force

          $configs = @("DevRelease", "HW2C_Exe")

          function Get-BadgeColor($pct) {
            if ($pct -lt 25) { return "red" }
            elseif ($pct -lt 50) { return "orange" }
            elseif ($pct -lt 75) { return "yellow" }
            else { return "brightgreen" }
          }

          foreach ($config in $configs) {
            Copy-Item "${config}_report\report.json" "${reportDir}\${config}-report.json"

            $report = Get-Content "${config}_report\report.json" | ConvertFrom-Json

            $measures = $report.measures
            $percent = if ($measures.PSObject.Properties['matched_functions_percent']) { [math]::Round($measures.matched_functions_percent, 2) } else { 0 }
            $percentEncoded = [Uri]::EscapeDataString("$percent%")
            $badgeUrl = "https://img.shields.io/badge/Matching-$percentEncoded-$(Get-BadgeColor $percent)"
            Invoke-WebRequest -Uri $badgeUrl -OutFile "${imagesDir}\${config}-objdiff-matching.svg"

            foreach ($category in $report.categories) {
              $catMeasures = $category.measures
              $catPercent = if ($catMeasures.PSObject.Properties['matched_functions_percent']) { [math]::Round($catMeasures.matched_functions_percent, 2) } else { 0 }
              $catPercentEncoded = [Uri]::EscapeDataString("$catPercent%")
              $catLabel = [Uri]::EscapeDataString($category.name)
              $catBadgeUrl = "https://img.shields.io/badge/$catLabel-$catPercentEncoded-$(Get-BadgeColor $catPercent)"
              Invoke-WebRequest -Uri $catBadgeUrl -OutFile "${imagesDir}\${config}-objdiff-$($category.id).svg"
            }
          }

          Set-Location Homeworld2Classic-Reports
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          $sourceUrl = "https://github.com/HaydnTrigg/Homeworld2Classic/tree/$sha"
          "$($env:COMMIT_TITLE)`n`n$sourceUrl" | Set-Content -Path "..\commit_msg.txt" -Encoding utf8

          git add .
          git commit -F ..\commit_msg.txt
          # git tag -f workflow-reports-latest
          git push origin workflow-reports
          # git push origin refs/tags/workflow-reports-latest --force
